name: Load Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Start Docker stack
        run: |
          cd docker-stack
          docker compose up -d
          sleep 10

      - name: Run Locust test
        run: |
          locust -f src/locustfiles/simple_load.py --host=http://localhost:8000 --headless -u 10 -r 2 --run-time 1m --html=report.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: report.html

